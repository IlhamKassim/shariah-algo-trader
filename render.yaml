services:
  - type: web
    name: shariah-algo-trader-dashboard
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn dashboard.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: ETF_SYMBOL
        sync: false
      - key: TOP_N
        sync: false
      - key: DAY_ALPACA_API_KEY
        sync: false
      - key: DAY_ALPACA_API_SECRET
        sync: false
      - key: DAY_ALPACA_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RISK_FREE_RATE
        value: "0.05"
      - key: BENCHMARK_TICKER
        value: "SPUS"

  - type: worker
    name: shariah-algo-trader-bot
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run shariah-trader
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: ETF_SYMBOL
        sync: false
      - key: ETF_SYMBOLS
        value: "SPUS"
      - key: TOP_N
        sync: false
      - key: JOB_TIME
        value: "09:30"
      - key: DRIFT_THRESHOLD
        value: "0.03"
      - key: SECTOR_CAP
        value: "0.20"

  - type: worker
    name: day-trader-bot
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run day-trader
    envVars:
      - key: DAY_ALPACA_API_KEY
        sync: false
      - key: DAY_ALPACA_API_SECRET
        sync: false
      - key: DAY_ALPACA_BASE_URL
        sync: false
      - key: DAY_ALPACA_DATA_URL
        sync: false
      - key: DAY_MAX_POSITIONS
        value: "5"
      - key: DAY_POSITION_SIZE_PCT
        value: "0.20"
      - key: DAY_STOP_LOSS_PCT
        value: "0.05"
      - key: DAY_TRAILING_STOP_PCT
        value: "0.03"
      - key: DAY_GAP_PCT
        value: "0.045"
      - key: DAY_RVOL_THRESHOLD
        value: "2.5"
      - key: DAY_PROFIT_TARGET_MULT
        value: "3.0"
      - key: DAY_MAX_LOSS_PCT
        value: "0.07"
      - key: DAY_ORB_MINUTES
        value: "15"
      - key: ALPACA_FEED
        value: "iex"
